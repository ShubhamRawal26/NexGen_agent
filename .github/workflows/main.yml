name: Run AI Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # हर 4 घंटे में रीस्टार्ट

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
